services:

  # ── Laravel Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stb_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

      FIREBASE_CREDENTIALS: /var/www/firebase-service-account.json
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor # anonymous volume giữ vendor không bị ghi đè
    ports:
      - "8000:8000"

    networks:
      - stb_network

  # ── React Frontend (Dev Server) ──────────────────────────
  # Dùng cho môi trường development với hot reload
  # Build production: đổi command thành "npm run build" và dùng Nginx
  frontend:
    build:
      context: ./frontend_web # ✅ Đúng tên thư mục
      dockerfile: Dockerfile
    container_name: stb_frontend
    restart: unless-stopped
    volumes:
      - ./frontend_web:/app # ✅ Đúng tên thư mục
      - frontend_node_modules:/app/node_modules # giữ node_modules không bị ghi đè
    ports:
      - "5173:80" # Nginx phục vụ trên port 80 bên trong, map ra 5173
    networks:
      - stb_network

  # ── Caddy Reverse Proxy (Tự động HTTPS + Tên miền) ────────────
  caddy:
    image: caddy:alpine
    container_name: stb_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - stb_network

volumes:
  caddy_data:
  caddy_config:

  backend_vendor:
  frontend_node_modules:


networks:
  stb_network:
    driver: bridge
