services:

  # ── Laravel Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stb_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      FIREBASE_CREDENTIALS: /var/www/firebase-service-account.json
      REVERB_HOST: reverb
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    ports:
      - "8000:8000"
    networks:
      - stb_network

  # ── React Frontend (Production) ──────────────────────────
  frontend:
    build:
      context: ./frontend_web
      dockerfile: Dockerfile
    container_name: stb_frontend
    restart: unless-stopped
    volumes:
      - ./frontend_web:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:80"
    networks:
      - stb_network


  # ── n8n Automation ──────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: stb_n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=socialtravelbooking.click
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_PATH=/n8n/
      - N8N_BASE_URL=https://socialtravelbooking.click/n8n/
      - WEBHOOK_URL=https://socialtravelbooking.click/n8n/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - stb_network

  # ── Reverb WebSocket (Realtime) ──────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stb_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    env_file:
      - ./backend/.env
    networks:
      - stb_network

  # ── Queue Worker (Xử lý Job ngầm: AI Chat, Email) ────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stb_queue
    command: php artisan queue:work --tries=3 --timeout=90
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REVERB_HOST: reverb
    volumes:
      - ./backend:/var/www
    networks:
      - stb_network

networks:
  stb_network:
    driver: bridge

volumes:
  backend_vendor:
  frontend_node_modules:
  n8n_data:
